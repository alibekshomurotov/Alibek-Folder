services:
  - type: worker
    name: video-downloader-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./bot_database.db
      - key: REDIS_ENABLED
        value: "false"
