services:
  - type: web
    name: video-downloader-bot
    env: python
    runtime: python-3.12.9
    buildCommand: bash build.sh
    startCommand: bash start.sh
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.9"
