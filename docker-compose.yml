version: '3.8'

services:
  bot:
    build: .
    container_name: video_downloader_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./cookies.txt:/app/cookies.txt
      - bot_data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - bot_network

  postgres:
    image: postgres:16-alpine
    container_name: video_downloader_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_password
      POSTGRES_DB: video_downloader
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bot_network

  redis:
    image: redis:7-alpine
    container_name: video_downloader_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - bot_network

  nginx:
    image: nginx:alpine
    container_name: video_downloader_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - bot
    networks:
      - bot_network

volumes:
  postgres_data:
  redis_data:
  bot_data:

networks:
  bot_network:
    driver: bridge
